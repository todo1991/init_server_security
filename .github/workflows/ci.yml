name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cài phụ thuộc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq nftables shellcheck
      - name: Chạy test (root để nft -c kiểm tra kernel-level)
        run: sudo bash tests/run.sh
